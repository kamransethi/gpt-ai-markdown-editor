name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    name: Claude Code Review
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch fork branch for cross-repo PR comments
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          HEAD_REF=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRefName -q '.headRefName')
          HEAD_OWNER=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRepositoryOwner -q '.headRepositoryOwner.login')
          REPO_NAME=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRepository -q '.headRepository.name')
          BASE_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          if [ "$HEAD_OWNER" != "$BASE_OWNER" ]; then
            git remote add fork https://github.com/$HEAD_OWNER/$REPO_NAME.git || true
            git fetch fork $HEAD_REF:$HEAD_REF
          fi

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: '@claude'
          use_sticky_comment: true
          include_fix_links: true
          claude_args: >
            --model claude-opus-4-6
            --disallowedTools Write,Edit,Bash
            --system-prompt "You are a senior software engineer performing a deep code review on a VS Code extension built with TypeScript and TipTap. Review for: logic correctness and edge cases, security vulnerabilities (XSS, injection, data exposure), TypeScript type safety and VS Code extension API best practices, naming and readability, test coverage gaps, and performance concerns. Post structured inline comments on the specific lines where issues occur. Be direct and specific: cite the exact problem and suggest a concrete fix. Do not make code changes or push commits."
