name: Close Stale Issues

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v8
        with:
          # Stale settings
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          close-issue-message: 'This issue was closed because it has been inactive for too long.'
          close-pr-message: 'This PR was closed because it has been inactive for too long.'
          
          # Don't mark these as stale
          exempt-issue-labels: 'pinned,security,help-wanted'
          exempt-pr-labels: 'pinned,work-in-progress'
          
          # Issue specific
          stale-issue-message: |
            This issue has been inactive for 30 days. It will be closed in 7 days if there is no further activity.
            
            If you believe this is still relevant, please comment to keep it open.
